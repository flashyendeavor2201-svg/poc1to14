<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.error {
color: #ef4444;
font-size: 0.875rem; margin-top: 4px;
}
.success { border-color: #10b981; }
</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12">

<div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">

<!-- Header -->
<div class="bg-indigo-600 text-white p-8 text-center">
<h1 class="text-3xl font-bold">Student Registration</h1>
<p class="mt-2 text-indigo-100">Please fill all the required information</p>
</div>
 

<form id="studentForm" class="p-10 space-y-8" onsubmit="handleSubmit(event)">

<!-- Enrollment Number -->
<div>
<label class="block text-gray-700 font-medium mb-2">Enrollment Number <span class="text-red-500">*</span></label>
<input type="text" id="enrollment"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="e.g., 92400119140" maxlength="11" required>
<div id="enrollmentError" class="error"></div>
</div>

<!-- Full Name -->
<div>
<label class="block text-gray-700 font-medium mb-2">Full Name <span class="text-red-500">*</span></label>
<input type="text" id="name"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="Enter your full name" required>
<div id="nameError" class="error"></div>
</div>

<!-- Email -->
<div>
<label class="block text-gray-700 font-medium mb-2">Email ID <span class="text-red-500">*</span></label>
<input type="email" id="email"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="example@gmail.com" required>
<div id="emailError" class="error"></div>
</div>
 

<!-- Password & Confirm Password -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-gray-700 font-medium mb-2">Password <span class="text-red-500">*</span></label>
<input type="password" id="password"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="Create password" required>
<div id="passwordError" class="error"></div>
</div>
<div>
<label class="block text-gray-700 font-medium mb-2">Confirm Password <span class="text-red-500">*</span></label>
<input type="password" id="confirmPassword"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="Confirm password" required>
<div id="confirmPasswordError" class="error"></div>
</div>
</div>

<!-- Phone Number -->
<div>
<label class="block text-gray-700 font-medium mb-2">Phone Number <span class="text-red-500">*</span></label>
<input type="tel" id="phone"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="9876543210" maxlength="10" required>
<div id="phoneError" class="error"></div>
</div>

<!-- Address -->
<div>
 

<label class="block text-gray-700 font-medium mb-2">Address <span class="text-red-500">*</span></label>
<textarea id="address" rows="3"
class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition"
placeholder="Enter your full address" required></textarea>
<div id="addressError" class="error"></div>
</div>

<!-- Gender -->
<div>
<label class="block text-gray-700 font-medium mb-3">Gender <span class="text-red-500">*</span></label>
<div class="flex gap-8">
<label class="flex items-center gap-2">
<input type="radio" name="gender" value="Male" class="w-4 h-4 accent-indigo-600">
<span class="text-gray-700">Male</span>
</label>
<label class="flex items-center gap-2">
<input type="radio" name="gender" value="Female" class="w-4 h-4 accent-indigo-600">
<span class="text-gray-700">Female</span>
</label>
<label class="flex items-center gap-2">
<input type="radio" name="gender" value="Other" class="w-4 h-4 accent-indigo-600">
<span class="text-gray-700">Other</span>
</label>
</div>
<div id="genderError" class="error"></div>
</div>

<!-- Branch Selection -->
<div>
<label class="block text-gray-700 font-medium mb-2">Choose Branch <span class="text-red-500">*</span></label>
<select id="branch"
 

class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 transition" required>
<option value="">-- Select Branch --</option>
<option value="Computer Science">Computer Science & Engineering</option>
<option value="Information Technology">Information Technology</option>
<option value="Electronics">Electronics & Communication</option>
<option value="Mechanical">Mechanical Engineering</option>
<option value="Civil">Civil Engineering</option>
<option value="Electrical">Electrical Engineering</option>
<option value="Cyber Security">Computer Science & Engineering - Cyber Security</option>
</select>
<div id="branchError" class="error"></div>
</div>

<!-- Submit Button -->
<button type="submit"
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl text-lg transition duration-300 flex items-center justify-center gap-3">
<i class="fas fa-user-plus"></i> Register Student
</button>

</form>
</div>

<script>
function handleSubmit(e) { e.preventDefault();

clearErrors();
let isValid = true;

// Enrollment Number Validation (11 digits only)
const enrollment = document.getElementById('enrollment').value.trim(); if (!enrollment || !/^\d{11}$/.test(enrollment)) {
 

showError('enrollmentError', 'Enrollment number must have 11 digits'); isValid = false;
}

// Name Validation
const name = document.getElementById('name').value.trim(); if (!name || name.length < 3) {
showError('nameError', 'Name must be at least 3 characters long'); isValid = false;
}

// Email Validation
const email = document.getElementById('email').value.trim(); const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!email || !emailRegex.test(email)) { showError('emailError', 'Please enter a valid email address'); isValid = false;
}

// Password Validation
const password = document.getElementById('password').value;
const confirmPassword = document.getElementById('confirmPassword').value;

if (!password || password.length < 6) {
showError('passwordError', 'Password must be at least 6 characters'); isValid = false;
}

if (password !== confirmPassword) { showError('confirmPasswordError', 'Passwords do not match'); isValid = false;
}

// Phone Validation
const phone = document.getElementById('phone').value.trim();
 

if (!phone || !/^\d{10}$/.test(phone)) {
showError('phoneError', 'Phone number must be exactly 10 digits'); isValid = false;
}

// Address Validation
const address = document.getElementById('address').value.trim(); if (!address || address.length < 10) {
showError('addressError', 'Please enter a complete address (minimum 10 characters)'); isValid = false;
}

// Gender Validation
const gender = document.querySelector('input[name="gender"]:checked'); if (!gender) {
showError('genderError', 'Please select your gender'); isValid = false;
}

// Branch Validation
const branch = document.getElementById('branch').value; if (!branch) {
showError('branchError', 'Please select a branch'); isValid = false;
}

if (isValid) {
alert("✅ Registration Successful!\n\nStudent data has been validated successfully."); document.getElementById('studentForm').reset();
}
}

function showError(id, message) {
const errorElement = document.getElementById(id); if (errorElement) errorElement.textContent = message;
 

}

function clearErrors() {
const errors = document.querySelectorAll('.error'); errors.forEach(err => err.textContent = '');
}
</script>

</body>
</html>
