<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form>
    <label>Full Name:</label><br>
    <input type="text" name="sname" placeholder="Enter full name" required><br><br>

    <label>Roll Number:</label><br>
    <input type="text" name="roll" required><br><br>

    <label>Date of Birth:</label><br>
    <input type="date" name="dob" required><br><br>


    <label>Gender:</label><br>
    <input type="radio" name="gender" required> Male
    <input type="radio" name="gender"> Female<br><br>

    <label>Course:</label><br>
    <select name="course" required>
        <option value="">Select Course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>MCA</option>
    </select><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="example@mail.com" required><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" name="phone" placeholder="10-digit number" pattern="[0-9]{10}" required><br><br>

    <label>Address:</label><br>
    <textarea rows="4" cols="30" placeholder="Enter address" required></textarea><br><br>

    
<input type="submit" value="Register">
    <input type="reset" value="Clear">
</form>

</body>
</html>

<!DOCTYPE html>

</head>
<body>

<h2>Employee Registration Form</h2>

<form>
    <label>Employee Name:</label><br>
    <input type="text" name="ename" placeholder="Enter name" required><br><br>

    <label>Employee ID:</label><br>
    <input type="text" name="eid" required><br><br>

    <label>Date of Joining:</label><br>
    <input type="date" name="doj" required><br><br>

    <label>Department:</label><br>
    

<select name="dept" required>
        <option value="">Select Department</option>
        <option>HR</option>
        <option>IT</option>
        <option>Finance</option>
        <option>Marketing</option>
    </select><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender" required> Male
    <input type="radio" name="gender"> Female<br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="employee@mail.com" required><br><br>

    <label>Contact Number:</label><br>
    <input type="tel" name="contact" pattern="[0-9]{10}" placeholder="10-digit number" required><br><br>

    <label>Experience (Years):</label><br>
    <input type="number" name="exp" min="0" max="40" required><br><br>

    <label>Address:</label><br>
    


<textarea rows="4" cols="30" placeholder="Enter address" required></textarea><br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
