<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Checkout Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style> body {
background: linear-gradient(135deg, #e1e8f1, #f2f4f8);
}

.checkout-container { margin-top: 40px; background: #ffffff; padding: 30px; border-radius: 15px;
box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #f0f0f0;
}

.icon {
margin-right: 8px;
color: #6c63ff;  /* soft purple accent */
 

}
.card-img { width: 50px;
margin-right: 5px;
}
.btn-primary {
background: linear-gradient(135deg, #6c63ff, #5a54d1); border: none;
border-radius: 25px; transition: 0.3s;
}

.btn-primary:hover {
background: linear-gradient(135deg, #5a54d1, #4b47b8); transform: translateY(-2px);
}
.form-control {
border-radius: 10px; border: 1px solid #ddd; transition: 0.2s;
}

.form-control:focus { border-color: #6c63ff;
box-shadow: 0 0 5px rgba(108, 99, 255, 0.3);
}
h2, h3, h4 {
color: #2d2d2d;
}
label {
color: #555;
font-weight: 500;
}
</style>
</head>
 

<body>

<div class="container">
<div class="checkout-container">
<h2 class="text-danger">Responsive Checkout Form</h2>
<p class="text-muted">Don’t worry, we trust you… but our payment system doesn’t</p>

<div class="row">

<div class="col-md-6">
<h4>Billing Address</h4>

<div class="mb-3">
<label class="form-label"><i class="bi bi-person-fill icon"></i>Full Name</label>
<input type="text" class="form-control" placeholder="Srikar Vaila ">
</div>

<div class="mb-3">
<label class="form-label"><i class="bi bi-envelope-fill icon"></i>Email</label>
<input type="email" class="form-control" placeholder="Srikar@gmail.com">
</div>

<div class="mb-3">
<label class="form-label"><i class="bi bi-geo-alt-fill icon"></i>Address</label>
<input type="text" class="form-control" placeholder="MG Road">
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">State</label>
 

<input type="text" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Zip</label>
<input type="text" class="form-control">
</div>
</div>
</div>

<div class="col-md-6">
<h4>Payment</h4>

<label class="form-label">Accepted Cards</label>
<div class="mb-3">
<img src="https://img.icons8.com/color/48/000000/visa.png" class="card-img"/>
<img src="https://img.icons8.com/color/48/000000/mastercard.png" class="card-img"/>
<img src="https://img.icons8.com/color/48/000000/amex.png" class="card-img"/>
<img src="https://img.icons8.com/color/48/000000/discover.png" class="card-img"/>
</div>

<div class="mb-3">
<label class="form-label">Name on Card</label>
<input type="text" class="form-control" placeholder="Srikar Vaila ">
</div>

<div class="mb-3">
<label class="form-label">Credit card number</label>
<input type="text" class="form-control" placeholder="1111-2222-3333-4444">
</div>
<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">Exp Month</label>
<input type="text" class="form-control" placeholder="December">
</div>
 


<div class="col-md-3 mb-3">
<label class="form-label">Exp Year</label>
<input type="text" class="form-control" placeholder="2028">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">CVV</label>
<input type="text" class="form-control" placeholder="123">
</div>
</div>

</div>

</div>

<div class="form-check mt-3">
<input class="form-check-input" type="checkbox" id="sameAddress">
<label class="form-check-label" for="sameAddress"> Shipping address same as billing
</label>
</div>
<button class="btn btn-danger w-100 mt-4">Continue to checkout</button>
</div>
</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
