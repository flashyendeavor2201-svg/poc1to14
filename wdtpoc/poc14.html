<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style> body {
font-family: Arial;
background: linear-gradient(135deg, #6366f1, #0ea5e9); display: flex;
justify-content: center; align-items: center; height: 100vh;
}

/* Container */
.quiz-box { background: white; width: 800px; padding: 25px; border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Header */ h2 {
text-align: center; color: #4f46e5;
 

}

/* Question */
.question {
font-size: 20px; margin-bottom: 15px;
}

/* Options */
.options button { display: block; width: 100%;
margin: 8px 0; padding: 12px; border: none; border-radius: 10px;
background: #eef2ff; cursor: pointer; transition: 0.3s;
}

.options button:hover { background: #c7d2fe;
}

/* Selected */
.selected {
background: #6366f1 !important; color: white;
}

/* Next button */
.next-btn {
margin-top: 15px; width: 100%;
 

padding: 12px; border: none; border-radius: 25px;
background: linear-gradient(135deg, #6366f1, #0ea5e9); color: white;
font-size: 16px; cursor: pointer;
}

/* Result */
.result {
display: none;
}

.correct { color: green;
}

.wrong { color: red;
}
</style>
</head>

<body>

<div class="quiz-box">

<h2>🧠 Quiz App</h2>

<div id="quiz">
<div class="question" id="question"></div>
<div class="options" id="options"></div>
<button class="next-btn" onclick="nextQuestion()">Next ➡</button>
</div>
 


<div class="result" id="result"></div>

</div>

<script>
const quizData = [
{
question: "What is HTML?",
options: ["Programming Language", "Markup Language", "Database", "OS"], correct: 1
},
{
question: "What does CSS do?",
options: ["Structure", "Logic", "Styling", "Database"], correct: 2
},
{
question: "Which is JavaScript used for?",
options: ["Styling", "Database", "Interactivity", "Hardware"], correct: 2
},

{
question: "Which CSS property changes color?", options: ["font", "color", "bg", "style"],
correct: 1
},
{
question: "Which language runs in browser?", options: ["Java", "Python", "JavaScript", "C++"], correct: 2
},

{
 

question: "Which is not a programming language?", options: ["HTML", "Python", "Java", "C"],
correct: 0
},
{
question: "CSS stands for?",
options: ["Creative Style Sheet", "Cascading Style Sheets", "Color Style Sheet", "Computer Style
Sheet"],
correct: 1
},
{
question: "Which symbol is used for comments in JS?", options: ["//", "#", "<!	>", "**"],
correct: 0
}
];

let current = 0; let score = 0;
let userAnswers = []; let selectedIndex = null;

function loadQuestion() { let q = quizData[current];
document.getElementById("question").innerText = (current+1) + ". " + q.question;

let optionsHTML = ""; q.options.forEach((opt, i) => {
optionsHTML += `<button onclick="selectAnswer(${i}, this)">${opt}</button>`;
});

document.getElementById("options").innerHTML = optionsHTML; selectedIndex = null;
}
 

function selectAnswer(index, btn) { selectedIndex = index;

document.querySelectorAll(".options button").forEach(b => { b.classList.remove("selected");
});

btn.classList.add("selected");
}

function nextQuestion() {

if (selectedIndex === null) { alert("Please select an answer!"); return;
}

userAnswers[current] = selectedIndex;

if (selectedIndex === quizData[current].correct) { score++;
}

current++;

if (current < quizData.length) { loadQuestion();
} else {
showResult();
}
}

function showResult() { document.getElementById("quiz").style.display = "none";
 

let resultDiv = document.getElementById("result"); resultDiv.style.display = "block";
let html = `<h3>Your Score: ${score}/${quizData.length}</h3><hr>`; quizData.forEach((q, i) => {
if (userAnswers[i] !== q.correct) {
html += `
<p class="wrong">
❌ ${i+1}. ${q.question}<br>
Your Answer: ${q.options[userAnswers[i]]}<br> Correct Answer: ${q.options[q.correct]}
</p>
`;
} else {
html += `<p class="correct">✅ ${i+1}. ${q.question}</p>`;
}
});

resultDiv.innerHTML = html;
}

loadQuestion();
</script>

</body>
</html>
